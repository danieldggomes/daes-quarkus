{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.name" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
type: Opaque
data:
  QUARKUS_DATASOURCE_PASSWORD: {{ .Values.postgres.auth.password | trim | b64enc | quote }}
{{- end }}