{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app.name" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}  
data:
  POSTGRESQL_DATABASE: {{ .Values.postgres.auth.database | quote }}
  QUARKUS_DATASOURCE_USERNAME: {{ .Values.postgres.auth.username | quote }}
  QUARKUS_DATASOURCE_JDBC_URL: {{ printf "jdbc:postgresql://%s:%d/%s" .Values.postgres.serviceName .Values.postgres.servicePort .Values.postgres.auth.database | quote }}
{{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | toString | quote }}
{{- end }}
{{- end }}