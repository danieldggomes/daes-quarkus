# -----------------------------------------------------------------------------
# Banco de dados principal (perfil default/prod)
# -----------------------------------------------------------------------------
# Tipo de banco usado pela aplicacao no perfil default.
quarkus.datasource.db-kind=postgresql
# Credenciais com fallback local para desenvolvimento.
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:postgres}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:postgres}
# URL JDBC com fallback local.
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/previdencia}
# Tamanho minimo e maximo do pool de conexoes.
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=16

# -----------------------------------------------------------------------------
# Hibernate ORM (perfil default/prod)
# -----------------------------------------------------------------------------
# Estrategia de schema: recria banco a cada inicializacao.
quarkus.hibernate-orm.database.generation=drop-and-create
# Log SQL no console (bom para debug, ruidoso para producao).
quarkus.hibernate-orm.log.sql=true
# Script de carga inicial de dados.
quarkus.hibernate-orm.sql-load-script=import.sql

# -----------------------------------------------------------------------------
# Runtime HTTP
# -----------------------------------------------------------------------------
quarkus.devservices.enabled=false
# Porta HTTP da aplicacao.
quarkus.http.port=8080

# -----------------------------------------------------------------------------
# Perfil benchmark (autocontido, sem PostgreSQL externo)
# -----------------------------------------------------------------------------
# Quando QUARKUS_PROFILE=benchmark, estas chaves desativam datasource/ORM
# para permitir subir a aplicacao sem dependencia de banco.
%benchmark.quarkus.datasource.active=false
%benchmark.quarkus.hibernate-orm.active=false
%benchmark.quarkus.hibernate-orm.sql-load-script=no-file
# Se quiser habilitar banco tambem no perfil benchmark, troque para:
# %benchmark.quarkus.datasource.active=true
# %benchmark.quarkus.hibernate-orm.active=true
# e configure URL/usuario/senha de banco validos para esse profile.

# -----------------------------------------------------------------------------
# OpenAPI / Swagger / Redoc
# -----------------------------------------------------------------------------
# Endpoint do contrato OpenAPI.
quarkus.smallrye-openapi.path=/openapi
# Endpoint da UI Swagger.
quarkus.swagger-ui.path=/swagger-ui
# Mantem Swagger UI disponivel fora do modo dev.
quarkus.swagger-ui.always-include=true
